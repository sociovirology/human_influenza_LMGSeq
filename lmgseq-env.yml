name: lmgseq
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # Core bioinformatics tools (versions from README)
  - cutadapt=2.6
  - pear=0.9.6
  - usearch=8.1.1861
  
  # R and packages (version from README: R 3.6.3)
  - r-base=3.6.3
  - r-dplyr
  - r-ggplot2
  - r-tidyr
  - r-reshape2
  - r-readr
  - r-gridextra
  - r-ggthemes
  - r-argparse
  - r-gtools
  - r-scales
  
  # Python for any potential scripting
  - python=3.7
  
  # Additional utilities likely needed
  - wget
  - gzip
  - grep
  - sed
  
# Alternative pip dependencies if conda versions unavailable
# pip:
#   - some-package==1.0.0